<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaviest birds table</title>
</head>

<body style="text-align: center;">
    <h1>Heaviest Birds</h1>
    <table>
        <thead>
            <tr>
                <th>Animal</th>
                <th>Average mass</th>
                <th>Max mass</th>
                <th>Flighted</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ostrich</td>
                <td>104(230)</td>
                <td>230</td>
                <td>no</td>
            </tr>
            <tr>
                <td>Somali Ostrich</td>
                <td>90(200)</td>
                <td>130</td>
                <td>no</td>
            </tr>
            <tr>
                <td>Wild Tukey</td>
                <td>13</td>
                <td>39</td>
                <td>Yes</td>
            </tr>
        </tbody>
    </table>
    <h2>V2</h2>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Animal</th>
                <th colspan="2">average mass</th>
                <th rowspan="2">Flighted</th>
            </tr>
            <tr>
                <th>kg</th>
                <th>lb</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ostrich</td>
                <td>104(230)</td>
                <td>1</td>
                <td>no</td>
            </tr>
            <tr>
                <td>Somali Ostrich</td>
                <td>90(200)</td>
                <td>2</td>
                <td>no</td>
            </tr>
            <tr>
                <td>Wild Tukey</td>
                <td>13</td>
                <td>3</td>
                <td>Yes</td>
            </tr>
        </tbody>
    </table>
    <h1>forms demo</h1>
    <form action="/tacos">
        <!-- Nmae attribute should be in every input -->
        <p>
            <label for="username">Enter a Username:</label>
            <input type="text" placeholder="Username here" id="username" name="username">
        </p>
        <p><label for="password">Enter your Password:</label>
            <input type="password" placeholder="Password here" id="password" name="password">
        </p>
        <p><label for="color">ENtern your color:</label>
            <input type="color" id="color" name="color">
        </p>
        <p><label for="file">Choose a file:</label>
            <input type="file" name="file" id="file">
        </p>
        <p><label for="range">range:</label>
            <input type="range" id="range" name="range">
        </p>
        <!-- This button does not submit the form because of its "button" value in te type attribute -->
        <button type="button">Does not submit</button>
        <p><label for="number">Pick a number:</label>
            <input type="number" placeholder="number here" name="num" id="number">
        </p>
        <!-- Two ways of creating a button that submits -->
        <button type="submit">Submit!!!</button>
        <p><input type="submit" value="click me!"></p>
    </form>
    <hr>
    <!-- THe following button exists outside the form and does nothing -->
    <p><button>This button</button></p>
    <a href="index.html">go back</a>
</body>

</html>
