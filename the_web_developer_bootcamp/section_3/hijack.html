<body>
    <h1>HIjacking Searchs</h1>
    <h2>Search reddit</h2>
    <form action="https://www.reddit.com/search">
        <input type="text" name="q" id="">
        <button>SEarch REddit</button>
    </form>
    <h2>Search GOogle</h2>
    <form action="https://www.google.com/search">
        <input type="text" name="q" id="">
        <button>Search GOogle</button>
    </form>
    <h2>SEarch Youtube</h2>
    <form action="https://www.youtube.com/results">
        <input type="text" name="search_query">
        <button>SEarch Youtube</button>
    </form>
    <hr>
    <h2>More inputs</h2>
    <form action="/birds">
        <input type="checkbox" name="agree_tos" id="agree" checked>
        <label for="agree">I agree to everything</label>
        <p>
            <label for="xs">XS:</label>
            <input type="radio" name="size" id="xs" value="xs">
            <label for="s">S:</label>
            <input type="radio" name="size" id="s" value="s">
            <label for="m">M:</label>
            <input type="radio" name="size" id="m" value="ma">
        </p>
        <p>
            <label for="pet-select">SElect a option:</label>
            <select name="pets" id="pet-select">
                <option value="">Choose a option</option>
                <option value="dog" selected>DOG</option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
            </select>
        </p>
        <p>
            <label for="cheese">Cheese amount:</label>
            <input type="range" name="cheese_value" id="cheese" min="180" max="200" value="190" step="">
        </p>
        <p>
            <label for="requests">Any special requests?</label>
            <textarea name="requests" id="requests" cols="30" rows="10"></textarea>
        </p>
        <button>Submit</button>
    </form>
    <hr>
    <h2>Validations Demo</h2>
    <form action="/dummy">
        <label for="first">Enter First name:</label>
        <input type="text" name="first name" id="first" required>
        <p>
            <label for="username">Username :</label>
            <input type="text" name="username" id="username" minlength="5" maxlength="20" required>
        </p>
        <p>
            <input type="url" name="" id="" required>
        </p>
        <button>Submit</button>
    </form>
